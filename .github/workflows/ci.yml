name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  id-token: write
  packages: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6

      - name: Install dependencies
        run: bun install

      - name: Build CLI
        run: bun run build

      - name: Verify build output exists
        run: |
          test -f dist/index.js
          head -1 dist/index.js | grep -q '#!/usr/bin/env node'

      - name: Scaffold a test app
        run: node dist/index.js test-app --display-name "Test App" --description "A test project"

      - name: Assert scaffolded directory structure
        run: |
          test -d test-app
          test -f test-app/package.json
          test -f test-app/next.config.ts
          test -f test-app/tsconfig.json
          test -f test-app/.gitignore
          test -f test-app/src/app/layout.tsx
          test -f test-app/src/app/page.tsx
          test -f test-app/src/db/sql.ts
          test -f test-app/src/db/migrations/00000-example-migration.ts
          test -f test-app/tailwind.config.ts
          test -f test-app/postcss.config.cjs
          test -d test-app/public

      - name: Assert scaffolded package.json content
        run: |
          cd test-app
          grep -q '"name": "test-app"' package.json
          grep -q '"next"' package.json
          grep -q '"react"' package.json
          grep -q '"typescript"' package.json

      - name: Assert scaffolded app compiles with TypeScript
        run: |
          cd test-app
          bun install
          bunx tsc --noEmit

  publish:
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install

      - name: Build CLI
        run: bun run build

      - name: Publish to npm
        run: npm publish --provenance
